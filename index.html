<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">

    <!-- Skip browser/PWA cache so new builds are picked up on reload. -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- PWA / Add-to-Home-Screen: launches in true fullscreen on iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <link rel="icon" type="image/png" href="assets/icons/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180.png">
    <link rel="manifest" href="manifest.webmanifest">

    <title>New Super Mario Bros 2D All Stars</title>

    <link rel="stylesheet" type="text/css" href="style.css">

    <script src="libraries/p5.min.js"></script>
    <script src="libraries/p5.sound.min.js"></script>
  </head>

  <body>
    <!-- constants & data (load first) -->
    <script src="src/constants.js?v=4"></script>
    <script src="src/sprites.js?v=4"></script>
    <script src="src/levels.js?v=4"></script>

    <!-- systems -->
    <script src="src/collision.js?v=4"></script>
    <script src="src/camera.js?v=4"></script>
    <script src="src/items.js?v=4"></script>
    <script src="src/enemies.js?v=4"></script>
    <script src="src/yoshi.js?v=4"></script>
    <script src="src/player.js?v=4"></script>

    <!-- rendering & UI -->
    <script src="src/hud.js?v=4"></script>
    <script src="src/menu.js?v=4"></script>
    <script src="src/input.js?v=4"></script>
    <script src="src/mobile.js?v=4"></script>

    <!-- main entry point -->
    <script src="sketch.js?v=4"></script>
  </body>
</html>
